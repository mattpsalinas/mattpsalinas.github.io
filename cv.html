<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="chrome=1">
  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/d9596d689f.js" crossorigin="anonymous"></script>

  <title>CV</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8f8f8;
      color: #222;
    }

    

    /* Navbar */
    .navbar {
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      padding: 15px 30px;
      margin: 0;
    }

    .nav-links a {
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    .nav-links a.active {
      border-bottom: 2px solid #333;
    }

   
    .cv {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 80px;
    }

    /* make the download link look like a button and centered */
  .cv-download {
  display: inline-flex;              /* shrink to content width */
  align-items: center;
  justify-content: center;
  gap: 8px;                          /* space between icon + text */
  
  padding: 10px 22px;
  border: 1px solid #333;
  border-radius: 6px;
  
  background: white;
  color: #333;
  text-decoration: none;
  font-weight: 600;
  font-size: 0.95rem;

  transition: all 0.18s ease;
}

.cv-download:hover {
  background: #333;
  color: #fff;
  transform: translateY(-1px);
}

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .gallery {
        gap: 50px;
      }
    }
  </style>
</head>

<body>
 
    <nav class="navbar">
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="research.html">Research Projects</a></li>
    <li><a href="gallery.html">Fieldwork Gallery</a></li>
    <li><a href="cv.html" class="active">CV</a></li>
    </ul>
  </nav>

    <!-- PDF Embed Section -->
    <main class="cv">
  <h2>Curriculum Vitae</h2>
<p>
  <section class="cv-download">
    <a href="cv.pdf" target="_blank" rel="noopener noreferrer">
       <i class="fa-solid fa-file-pdf"></i>
      Download CV
    </a>
  </p>
      
    </section>
 
</body>

</html>
