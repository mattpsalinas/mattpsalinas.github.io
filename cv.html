<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="chrome=1">
  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/d9596d689f.js" crossorigin="anonymous"></script>

  <title>CV</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8f8f8;
      color: #222;
    }

    

    /* Navbar */
    .navbar {
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      padding: 15px 30px;
      margin: 0;
    }

    .nav-links a {
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    .nav-links a.active {
      border-bottom: 2px solid #333;
    }

    .caption {
      font-size: 0.95rem;
      color: #555;
      line-height: 1.5;
    }

    /* Subtle fade-in on scroll */
    .gallery-item {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeIn 0.8s ease forwards;
      animation-delay: 0.2s;
    }

    .cv-page h2 {
      margin: 0 0 12px;
      font-size: 1.6rem;
      color: #222;
    }

    .cv-page p {
      margin: 10px 0 0;
    }

    /* make the download link look like a button and centered */
    .cv-download {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 18px;
      border: 1px solid #333;
      border-radius: 6px;
      text-decoration: none;
      color: #333;
      font-weight: 600;
      transition: all 0.18s ease;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .gallery {
        gap: 50px;
      }
    }
  </style>
</head>

<body>
 
    <nav class="navbar">
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="research.html">Research Projects</a></li>
    <li><a href="gallery.html">Fieldwork Gallery</a></li>
    <li><a href="cv.html" class="active">CV</a></li>
    </ul>
  </nav>

    <!-- PDF Embed Section -->
    <section class="cv-page">
  <h2>Curriculum Vitae</h2>
<p>
    <a href="cv.pdf" target="_blank" rel="noopener noreferrer">
      Download CV
    </a>
  </p>
      
    </section>
 
</body>

</html>
